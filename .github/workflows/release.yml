name: Release - Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.4.0)'
        required: true
        type: string

env:
  DOCKER_HUB_ORG: waylandzhang

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: agent-core
            context: .
            dockerfile: rust/agent-core/Dockerfile
          - name: orchestrator
            context: .
            dockerfile: go/orchestrator/Dockerfile
          - name: llm-service
            context: .
            dockerfile: python/llm-service/Dockerfile
          - name: gateway
            context: .
            dockerfile: go/orchestrator/cmd/gateway/Dockerfile
          - name: playwright-service
            context: ./python/playwright-service
            dockerfile: Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate Go Proto files
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          mkdir -p go/orchestrator/internal/pb
          cd protos && protoc -I. \
            --go_out=../go/orchestrator/internal/pb --go_opt=paths=source_relative \
            --go-grpc_out=../go/orchestrator/internal/pb --go-grpc_opt=paths=source_relative \
            agent/*.proto common/*.proto llm/*.proto orchestrator/*.proto session/*.proto

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # agent-core: amd64 only (Rust + QEMU arm64 is too slow ~60min)
      # Other services: multi-arch (Go/Python are fast under QEMU)
      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_HUB_ORG }}/${{ matrix.service.name }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_ORG }}/${{ matrix.service.name }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_ORG }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_ORG }}/${{ matrix.service.name }}:buildcache,mode=max
          platforms: ${{ matrix.service.name == 'agent-core' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}

      - name: Image digest
        run: echo "Published ${{ env.DOCKER_HUB_ORG }}/${{ matrix.service.name }}:${{ steps.version.outputs.version }}"

  # Desktop build is temporarily disabled — missing lib/auth module.
  # Will be restored in a separate workflow once the desktop auth is fixed.

  create-release:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Shannon ${{ steps.version.outputs.version }}
          generate_release_notes: false
          body: |
            ## Shannon ${{ steps.version.outputs.version }}

            ### Docker Images

            ```bash
            docker pull waylandzhang/gateway:${{ steps.version.outputs.version }}
            docker pull waylandzhang/orchestrator:${{ steps.version.outputs.version }}
            docker pull waylandzhang/agent-core:${{ steps.version.outputs.version }}
            docker pull waylandzhang/llm-service:${{ steps.version.outputs.version }}
            docker pull waylandzhang/playwright-service:${{ steps.version.outputs.version }}
            ```

            ### Quick Start

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Kocoro-lab/Shannon/main/scripts/install.sh | bash
            ```

            ### Full Changelog

            See [CHANGELOG.md](https://github.com/Kocoro-lab/Shannon/blob/${{ steps.version.outputs.version }}/CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
