syntax = "proto3";

package shannon.sandbox;
option go_package = "github.com/Kocoro-lab/Shannon/go/orchestrator/internal/pb/sandbox";

// SandboxService handles file operations in WASI-isolated workspaces.
// All paths are relative to the session's workspace root.
service SandboxService {
  // Read a file from session workspace
  rpc FileRead(FileReadRequest) returns (FileReadResponse);

  // Write a file to session workspace
  rpc FileWrite(FileWriteRequest) returns (FileWriteResponse);

  // List files in session workspace directory
  rpc FileList(FileListRequest) returns (FileListResponse);

  // Execute a safe command in session workspace
  rpc ExecuteCommand(CommandRequest) returns (CommandResponse);

  // Search file contents (grep-like)
  rpc FileSearch(FileSearchRequest) returns (FileSearchResponse);

  // Find-and-replace in a file
  rpc FileEdit(FileEditRequest) returns (FileEditResponse);

  // Delete file(s) or empty directory from session workspace
  rpc FileDelete(FileDeleteRequest) returns (FileDeleteResponse);
}

message FileReadRequest {
  string session_id = 1;
  string path = 2;           // Relative to /workspace or /memory
  int32 max_bytes = 3;       // Optional limit (0 = no limit up to 10MB)
  string encoding = 4;       // utf-8, base64 (default: utf-8)
  string user_id = 5;        // For /memory/ path resolution
}

message FileReadResponse {
  bool success = 1;
  string content = 2;
  string error = 3;
  int64 size_bytes = 4;
  string file_type = 5;      // Detected file extension
}

message FileWriteRequest {
  string session_id = 1;
  string path = 2;           // Relative to /workspace or /memory
  string content = 3;
  bool append = 4;           // false = overwrite, true = append
  bool create_dirs = 5;      // Create parent directories if needed
  string encoding = 6;       // utf-8, base64 (default: utf-8)
  string user_id = 7;        // For /memory/ path resolution
}

message FileWriteResponse {
  bool success = 1;
  int64 bytes_written = 2;
  string error = 3;
  string absolute_path = 4;  // Path within workspace
}

message FileListRequest {
  string session_id = 1;
  string path = 2;           // Relative to /workspace or /memory (empty = root)
  string pattern = 3;        // Optional glob pattern (e.g., "*.txt")
  bool recursive = 4;
  bool include_hidden = 5;
  string user_id = 6;        // For /memory/ path resolution
}

message FileEntry {
  string name = 1;
  string path = 2;           // Relative path from workspace root
  bool is_file = 3;
  int64 size_bytes = 4;      // 0 for directories
  int64 modified_time = 5;   // Unix timestamp
}

message FileListResponse {
  bool success = 1;
  repeated FileEntry entries = 2;
  string error = 3;
  int32 file_count = 4;
  int32 dir_count = 5;
}

// FileSearch - grep-like content search
message FileSearchRequest {
  string session_id = 1;
  string query = 2;
  string path = 3;
  int32 max_results = 4;
  bool regex = 5;
  string include = 6;
  int32 context_lines = 7;
}

message SearchMatch {
  string file = 1;
  int32 line = 2;
  string content = 3;
  repeated ContextLine context = 4;
}

message ContextLine {
  int32 line = 1;
  string content = 2;
}

message FileSearchResponse {
  bool success = 1;
  repeated SearchMatch matches = 2;
  string error = 3;
  int32 files_scanned = 4;
  int32 matches_found = 5;
  bool truncated = 6;
}

// FileEdit - find-and-replace in file
message FileEditRequest {
  string session_id = 1;
  string path = 2;
  string old_text = 3;
  string new_text = 4;
  bool replace_all = 5;
}

message FileEditResponse {
  bool success = 1;
  string error = 2;
  int32 replacements = 3;
  string snippet = 4;
  int64 file_size_after = 5;
}

message CommandRequest {
  string session_id = 1;
  string command = 2;        // e.g., "ls -la", "cat foo.txt"
  int32 timeout_seconds = 3; // Max 30 seconds
  string user_id = 4;        // For /memory/ path resolution in commands
}

message CommandResponse {
  bool success = 1;
  string stdout = 2;
  string stderr = 3;
  int32 exit_code = 4;
  string error = 5;
  int64 execution_time_ms = 6;
}

// FileDelete - delete file(s) or empty directory
message FileDeleteRequest {
  string session_id = 1;
  string path = 2;         // Target path relative to /workspace (file, empty dir, or base dir for glob)
  string pattern = 3;      // Optional glob pattern (e.g. "*.tmp"), applied within path directory
  bool recursive = 4;      // Whether glob matches subdirectories
}

message FileDeleteResponse {
  bool success = 1;
  string error = 2;
  int32 deleted_count = 3;           // Number of items actually deleted
  repeated string deleted_paths = 4; // Relative paths of deleted items
}
